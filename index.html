<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Segoe UI;
margin:0;
background:#f4f6fb;
}

/* HEADER */

.header img{
width:100%;
}

/* BUTTON */

.btn{
background:#00BCD4;
color:white;
border:none;
padding:15px;
font-size:18px;
border-radius:10px;
margin:10px;
}

.search{
width:90%;
padding:15px;
margin:15px;
border-radius:10px;
border:1px solid #ccc;
}

.card{
background:white;
margin:10px;
padding:15px;
border-radius:15px;
box-shadow:0 4px 10px rgba(0,0,0,.1);
}

.kode{
float:right;
background:#eee;
padding:5px 10px;
border-radius:10px;
font-size:12px;
}

</style>

</head>

<body>

<div class="header">
<img src="https://lh7-rt.googleusercontent.com/formsz/AN7BsVD9lL-J-1X4z3DN3y7RQJ6F_eVnMJ4vvy5N_r4JogL1tzIe9dxFWVfR8ro2i8BOqdXSYeRFBypWle8kZAxdbv0wI2JCK5HaocJwm6d_QeP2Dy5eHZMWxmOqHrAVS_DrR1I6g3NsYecntOjAHu0Y0CFuCp6IHUq2jaUdIbkhXZg7Hd4kMiJJZ-dBYtyWLL7gZzfx-Jd5qpD_fOUR=w6043?key=FGRKs9d1nNVOkmX5QU_r4w">
</div>

<button class="btn" onclick="startScan()">SCAN QR</button>

<input id="manual" class="search" placeholder="Input kode peserta manual">
<button class="btn" onclick="manual()">ABSEN MANUAL</button>

<div id="reader"></div>

<div id="stats"></div>

<div id="list"></div>

<script>

const API="https://script.google.com/macros/s/AKfycbx2RuH2Kua4DEoi-0DXD01l6USziMnMlbjULCJfxs4beuU4a6RJoYwWoNP4YkAMgSfBfQ/exec";

let pesertaCache={};
let html5Qr;

/* LOAD DATA */

async function loadData(){

let res=await fetch(API+"?action=getAll");
let data=await res.json();

data.forEach(p=>{
pesertaCache[p.kode]=p;
});

render();

}

/* RENDER */

function render(){

let hadir=Object.values(pesertaCache).filter(p=>p.status=="Hadir");
let belum=Object.values(pesertaCache).filter(p=>p.status!="Hadir");

stats.innerHTML=`
<h3>Hadir : ${hadir.length} | Belum : ${belum.length}</h3>
`;

list.innerHTML=hadir.map(p=>`
<div class="card">
<span class="kode">${p.kode}</span>
<b>${p.nama}</b>
</div>
`).join("");

}

/* SCAN */

function startScan(){

html5Qr=new Html5Qrcode("reader");

html5Qr.start(
{ facingMode:"environment" },
{ fps:10, qrbox:250 },
onScan
);

}

function onScan(kode){

if(!pesertaCache[kode]){
alert("Tidak ditemukan");
return;
}

let p=pesertaCache[kode];

if(p.status=="Hadir"){
alert("Sudah hadir");
return;
}

hadir(p.row,kode);

}

/* UPDATE HADIR */

async function hadir(row,kode){

await fetch(API,{
method:"POST",
body:JSON.stringify({
action:"hadir",
row:row
})
});

pesertaCache[kode].status="Hadir";

render();

}

/* MANUAL ABSEN */

async function manual(){

let kode=document.getElementById("manual").value;

if(!pesertaCache[kode]){
alert("Kode tidak ditemukan");
return;
}

let p=pesertaCache[kode];

await fetch(API,{
method:"POST",
body:JSON.stringify({
action:"manual",
kode:kode
})
});

pesertaCache[kode].status="Hadir";

render();

}

loadData();

</script>

</body>
</html>
